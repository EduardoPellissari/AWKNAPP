services:
  - type: web
    name: awknapp
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: awknapp-db
          property: connectionString

databases:
  - name: awknapp-db
